<script>
document.getElementById("panel").style.visibility = "hidden";
var Options = document.getElementsByClassName("same");

Options[num].style.backgroundColor = "rgb(59, 58, 58)";
}
function color2(num) {

function appear() {

document.getElementById("panel").style.visibility = "visible";
document.getElementById("svgjs").style.animation = "forsvg2 1s forwards";
}
 else {

    document.getElementById("svgjs").style.animation = "forsvg1 0.5s forwards";
    }
}
